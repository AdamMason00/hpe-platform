<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HPE Service Platform — Hyde Park Equipment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#E8620A; --orange-d:#c9510a; --dark:#1c1c1c; --dark-2:#262626;
    --line:#e5e5e5; --muted:#8a8a8a; --ok:#16a34a; --bad:#dc2626; --bg:#f4f5f7;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:'Barlow',system-ui,sans-serif;color:#1c1c1c;
    background:var(--dark);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(232,98,10,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(232,98,10,.10), transparent 60%),
      var(--dark);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  }
  .card{
    width:100%;max-width:440px;background:#fff;border-radius:16px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.45);
  }
  .head{background:var(--dark);color:#fff;padding:30px 32px 26px;position:relative}
  .head::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:var(--orange)}
  .logo{display:flex;align-items:center;gap:12px}
  .mark{
    width:46px;height:46px;border-radius:10px;background:var(--orange);
    display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';
    font-weight:700;font-size:22px;letter-spacing:1px;
  }
  .head h1{font-family:'Barlow Condensed';font-weight:700;font-size:24px;margin:0;letter-spacing:.5px}
  .head p{margin:2px 0 0;color:#bdbdbd;font-size:13px}
  .body{padding:26px 32px 30px}
  .tabs{display:flex;gap:8px;background:var(--bg);padding:5px;border-radius:10px;margin-bottom:22px}
  .tab{
    flex:1;text-align:center;padding:10px;border-radius:7px;cursor:pointer;font-weight:600;
    color:var(--muted);font-size:14px;user-select:none;
  }
  .tab.active{background:#fff;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .pane{display:none}.pane.active{display:block}

  .btn{
    width:100%;border:0;border-radius:10px;padding:13px;font-weight:600;font-size:15px;
    cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .btn-google{background:#fff;color:#1c1c1c;border:1px solid var(--line)}
  .btn-google:hover{background:#fafafa}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:var(--orange-d)}
  .hint{color:var(--muted);font-size:12.5px;line-height:1.5;margin:14px 2px 0;text-align:center}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:18px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}

  .manual{margin-top:6px}
  .manual input{
    width:100%;padding:12px;border:1px solid var(--line);border-radius:9px;font-size:14px;
    font-family:inherit;margin-bottom:12px;
  }
  .fldlabel{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:4px 2px 6px;
    text-transform:uppercase;letter-spacing:.5px}
  #signinBtn{margin-top:2px}

  /* PIN keypad */
  .pin-dots{display:flex;justify-content:center;gap:14px;margin:6px 0 20px}
  .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);transition:.15s}
  .dot.on{background:var(--orange);border-color:var(--orange)}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{
    padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:20px;
    font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;
  }
  .key:hover{background:var(--bg)}
  .key.ghost{border:0;background:transparent;cursor:default}
  .key.action{color:var(--orange);font-size:15px;font-family:inherit}

  .msg{margin-top:14px;padding:10px 12px;border-radius:9px;font-size:13px;display:none}
  .msg.err{display:block;background:#fdecec;color:var(--bad);border:1px solid #f6caca}
  .msg.ok{display:block;background:#eafaf0;color:var(--ok);border:1px solid #c7eed5}

  /* Module hub (after login) */
  .hub{display:none}
  .who{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .who .name{font-weight:700;font-size:16px}
  .who .role{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .who .out{background:none;border:0;color:var(--orange);font-weight:600;cursor:pointer;font-size:13px}
  .mods{display:grid;gap:12px}
  .mod{
    display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);
    border-radius:12px;text-decoration:none;color:inherit;transition:.15s;
  }
  .mod:hover{border-color:var(--orange);box-shadow:0 6px 18px rgba(232,98,10,.12)}
  .mod .ic{
    width:44px;height:44px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;background:var(--bg);font-size:22px;
  }
  .mod .t{font-weight:700;font-size:15px}
  .mod .d{font-size:12.5px;color:var(--muted)}
  .mod.disabled{opacity:.45;pointer-events:none}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);
    border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .foot{text-align:center;color:#777;font-size:11px;margin-top:22px}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">
        <div class="mark">HPE</div>
        <div>
          <h1>Service Platform</h1>
          <p>Hyde Park Equipment · South &amp; North</p>
        </div>
      </div>
    </div>

    <div class="body">
      <!-- ============ LOGIN ============ -->
      <div id="login">
        <div class="manual">
          <label class="fldlabel" for="idInput">HPE email or Employee #</label>
          <input id="idInput" type="text" placeholder="name@hydeparkequipment.ca  or  S043" autocomplete="username" autofocus>
          <label class="fldlabel" for="passInput">Passcode</label>
          <input id="passInput" type="password" inputmode="numeric" placeholder="••••" autocomplete="current-password">
          <button class="btn btn-primary" id="signinBtn">Sign in</button>
        </div>
        <div class="hint">
          Managers &amp; admins use their <b>@hydeparkequipment.ca</b> email.
          Technicians &amp; support use their <b>employee number</b>. Your passcode is set by an admin.
        </div>
        <div class="msg" id="msg"></div>
      </div>

      <!-- ============ HUB ============ -->
      <div class="hub" id="hub">
        <div class="who">
          <div>
            <div class="name" id="hubName">—</div>
            <div class="role" id="hubRole">—</div>
          </div>
          <button class="out" id="logoutBtn">Sign out</button>
        </div>
        <div class="mods" id="mods"></div>
      </div>

      <div class="foot">© Hyde Park Equipment · HPE Service Platform v1.0</div>
    </div>
  </div>

  <script src="shared/config.js"></script>
  <script src="shared/api.js"></script>
  <script src="shared/auth.js"></script>
  <script>
  (function(){
    var AUTH = window.HPE_AUTH, $ = function(id){return document.getElementById(id);};
    var msg = $('msg');

    function showMsg(text, kind){
      msg.textContent = text;
      msg.className = 'msg ' + (kind || 'err');
    }
    function clearMsg(){ msg.className='msg'; msg.textContent=''; }

    /* ---- unified sign-in (email or employee number + passcode) ---- */
    function doSignIn(){
      clearMsg();
      var id = $('idInput').value, pass = $('passInput').value;
      var btn = $('signinBtn'); var old = btn.textContent;
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      AUTH.login(id, pass).then(enterHub).catch(function(e){
        showMsg(e.message || 'Sign-in failed.');
      }).then(function(){ btn.disabled = false; btn.textContent = old; });
    }
    $('signinBtn').addEventListener('click', doSignIn);
    $('idInput').addEventListener('keydown', function(e){ if(e.key==='Enter') $('passInput').focus(); });
    $('passInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doSignIn(); });

    /* ---- module hub ---- */
    var MODULES = [
      { id:'kpi',      href:'kpi/index.html',      icon:'📊', title:'KPI Incentive Manager',
        desc:'Scoreboards, efficiency, payroll & bonuses',
        roles:['admin','manager','tech','support'] },
      { id:'warranty', href:'warranty/index.html', icon:'🛠️', title:'Warranty Management',
        desc:'Submit & track Kubota warranty claims',
        roles:['admin','manager','tech','support'] }
    ];

    function enterHub(sess){
      if(!sess) return;
      $('login').style.display='none';
      $('hub').style.display='block';
      $('hubName').textContent = sess.name || sess.email || 'Signed in';
      var roleLabel = ({admin:'Administrator',manager:'Store Manager',tech:'Technician',support:'Support Staff'})[sess.role] || sess.role;
      $('hubRole').textContent = roleLabel + (sess.store ? ' · ' + (sess.store==='south'?'South':'North') : '');
      var wrap=$('mods'); wrap.innerHTML='';
      MODULES.forEach(function(m){
        if(m.roles.indexOf(sess.role)===-1) return;
        var a=document.createElement('a');
        a.className='mod'; a.href=m.href;
        a.innerHTML='<div class="ic">'+m.icon+'</div><div><div class="t">'+m.title+'</div><div class="d">'+m.desc+'</div></div>';
        wrap.appendChild(a);
      });
    }

    $('logoutBtn').addEventListener('click', function(){
      AUTH.clearSession();
      $('hub').style.display='none';
      $('login').style.display='block';
      pin=''; renderPin(); clearMsg();
    });

    /* ---- resume existing session ---- */
    var existing = AUTH.getSession();
    if(existing) enterHub(existing);
  })();
  </script>
</body>
</html>
